<!DOCTYPE html>
<html lang="cs">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Fee Tracker — EU/EEA</title>
<meta name="description" content="Měsíční přehled interchange, scheme/processing fees a veřejně uváděných merchant service charges v EU/EEA.">
<style>
:root {
  --bg:#11152b; --bg2:#191f3d; --paper:#f8f7f4; --paper2:#ece9e3;
  --text:#15182d; --white:#f8f7f4; --muted:#6c7087; --muted-dark:#a3a8c5;

  --scheme:#0fa7a0; --processing:#8b5cf6; --msc:#d94e76; --good:#32c48d;
  --warn:#f2b84b; --danger:#e45d5d; --radius:20px; --small:11px;
  --font:Arial,Helvetica,sans-serif;
}
*{box-sizing:border-box} body{margin:0;background:linear-gradient(180deg,var(--bg) 0%,#0e1225 100%);color:var(--white);font-family:var(--font);-webkit-font-smoothing:antialiased}
a{color:inherit}.page{max-width:1240px;margin:auto;padding:40px 24px 80px}.masthead{display:grid;grid-template-columns:1fr auto;gap:24px;align-items:end;margin-bottom:28px}.eyebrow{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted-dark);display:flex;align-items:center;gap:9px}.live-dot{width:8px;height:8px;border-radius:50%;background:var(--good);box-shadow:0 0 0 4px rgba(50,196,141,.12)}h1{font-size:clamp(30px,4.4vw,52px);line-height:1.02;letter-spacing:-.035em;margin:14px 0 12px;max-width:780px}.lede{margin:0;color:var(--muted-dark);line-height:1.55;font-size:15px;max-width:760px}.month-pill{background:var(--bg2);border:1px solid var(--line-dark);border-radius:999px;padding:10px 14px;font-size:12px;color:var(--muted-dark);white-space:nowrap}.banner{display:none;background:var(--bg2);border:1px solid var(--line-dark);border-left:4px solid var(--warn);padding:13px 16px;border-radius:12px;color:var(--muted-dark);font-size:13px;line-height:1.45;margin:0 0 20px}.layer-tabs,.seg-group{display:flex;gap:8px;flex-wrap:wrap}.layer-tabs{margin:24px 0 16px}.tab,.seg-btn,.chip-btn{font:700 12.5px var(--font);border:1.5px solid var(--line-dark);background:transparent;color:var(--muted-dark);padding:9px 15px;border-radius:999px;cursor:pointer}.tab:hover,.seg-btn:hover,.chip-btn:hover{color:var(--white);border-color:#6c739a}.tab.active,.seg-btn.active,.chip-btn.active{background:var(--paper);color:var(--text);border-color:var(--paper)}.tab[data-layer="scheme_processing"].active{background:var(--scheme);color:white;border-color:var(--scheme)}.tab[data-layer="msc"].active{background:var(--msc);color:white;border-color:var(--msc)}
.controls{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:20px}.right-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap}select,input{font:700 12.5px var(--font);border:1.5px solid var(--line-dark);background:var(--bg);color:var(--muted-dark);padding:9px 12px;border-radius:999px}select{padding-right:28px}.hero{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px;margin-bottom:18px}.metric-card{background:var(--paper);color:var(--text);border-radius:var(--radius);padding:21px;min-height:190px;box-shadow:0 16px 36px -24px rgba(0,0,0,.7);border-top:5px solid var(--accent,var(--visa))}.metric-card .kicker{font-size:11px;text-transform:uppercase;letter-spacing:.07em;font-weight:800;color:var(--muted)}.metric-card h2{font-size:16px;margin:7px 0 0}.big-number{font-size:43px;font-weight:800;letter-spacing:-.035em;margin:17px 0 3px;font-variant-numeric:tabular-nums}.subline{font-size:12px;color:var(--muted);line-height:1.4}.range-track{height:8px;background:var(--paper2);border-radius:999px;margin-top:15px;position:relative}.range-fill{height:100%;border-radius:999px;background:var(--accent);opacity:.32;position:absolute}.range-dot{width:4px;height:16px;border-radius:4px;background:var(--accent);position:absolute;top:-4px}.range-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:6px}.empty{color:var(--muted);font-size:13px;line-height:1.5;margin-top:24px}.estimate-card{grid-column:span 3;background:linear-gradient(135deg,#f8f7f4 0%,#eef0ff 100%);display:grid;grid-template-columns:1.15fr 1fr 1.25fr;gap:20px;min-height:auto;border-top-color:var(--good)}.estimate-card .big-number{color:#126d54}.estimate-controls{display:grid;grid-template-columns:1fr 1fr;gap:9px;align-content:start}.estimate-controls label{font-size:11px;color:var(--muted);font-weight:700}.estimate-controls select,.estimate-controls input{width:100%;background:white;color:var(--text);border-color:var(--line);border-radius:10px;margin-top:5px}.formula{background:white;border:1px solid var(--line);border-radius:14px;padding:13px;font-size:12px;color:var(--muted);line-height:1.65}.formula strong{color:var(--text)}.status-tag{display:inline-block;padding:3px 8px;border-radius:999px;font-size:10px;font-weight:800;margin-top:8px}.status-tag.observed{background:#d9f5eb;color:#126d54}.status-tag.model{background:#fff0cf;color:#7d5700}.status-tag.incomplete{background:#f8dfe4;color:#9c2f4e}
.section-head{display:flex;justify-content:space-between;gap:16px;align-items:baseline;margin:28px 0 11px}.section-head h2{font-size:18px;margin:0}.section-note{font-size:12px;color:var(--muted-dark);text-align:right}.panel{background:var(--paper);color:var(--text);border-radius:var(--radius);padding:19px 21px}.trend-panel{min-height:270px}.legend{display:flex;gap:15px;flex-wrap:wrap;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:8px}.legend i{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:5px;vertical-align:-1px}.table-wrap{background:var(--paper);color:var(--text);border-radius:var(--radius);overflow:auto}table{border-collapse:collapse;width:100%;min-width:800px}th{text-align:left;padding:14px 15px 10px;color:var(--muted);font-size:10.5px;text-transform:uppercase;letter-spacing:.055em;white-space:nowrap}td{padding:12px 15px;border-top:1px solid var(--line);font-size:13px;vertical-align:middle}tbody tr:hover{background:#f0eee9}.country{font-weight:800}.region{font-size:10px;text-transform:uppercase;color:var(--muted);font-weight:700;margin-left:6px}.value{font-weight:800;font-variant-numeric:tabular-nums}.range{font-size:11px;color:var(--muted);display:block;margin-top:2px}.source-link{font-size:11px;color:#4755cb;text-decoration:none;border-bottom:1px dotted currentColor}.source-link:hover{color:var(--text)}.media-badges{display:flex;gap:4px;flex-wrap:wrap}.media-badge{padding:4px 7px;border-radius:999px;font-size:10px;font-weight:800;text-decoration:none;background:#e9eafa;color:#4652c9}.media-badge.scheme{background:#d9f2ef;color:#087e78}.media-badge.processing{background:#eee6ff;color:#6c3bd1}.media-badge.msc{background:#f7dfe6;color:#a52d52}.confidence{font-size:10px;color:var(--muted)}.warning{color:var(--danger);font-weight:800}.media-list{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:11px}.media-item{background:var(--paper);color:var(--text);border-radius:14px;padding:15px 17px;border-left:4px solid var(--accent,var(--visa))}.media-item h3{font-size:14px;line-height:1.35;margin:0 0 7px}.media-context{font-size:12px;color:var(--muted);line-height:1.5;margin:0 0 9px}.media-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center;font-size:10.5px;color:var(--muted)}.media-meta span,.media-meta a{background:var(--paper2);padding:3px 7px;border-radius:6px;text-decoration:none}.media-meta .reported{background:var(--text);color:white;font-weight:800}.state-message{background:var(--paper);color:var(--text);padding:24px;border-radius:var(--radius);line-height:1.6}.methodology{font-size:12px;color:var(--muted-dark);line-height:1.55;margin-top:22px;border-top:1px solid var(--line-dark);padding-top:18px}footer{display:flex;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-top:32px;padding-top:20px;border-top:1px solid var(--line-dark);font-size:11px;color:var(--muted-dark)}
@media(max-width:900px){.hero{grid-template-columns:1fr 1fr}.estimate-card{grid-column:span 2;grid-template-columns:1fr 1fr}.estimate-card>div:last-child{grid-column:span 2}.media-list{grid-template-columns:1fr}.masthead{grid-template-columns:1fr}.month-pill{justify-self:start}}@media(max-width:620px){.page{padding:28px 14px 60px}.hero{grid-template-columns:1fr}.estimate-card{grid-column:span 1;grid-template-columns:1fr}.estimate-card>div:last-child{grid-column:span 1}.section-head{display:block}.section-note{text-align:left;margin-top:5px}.big-number{font-size:38px}}.csv-btn{font:700 12.5px var(--font);border:1.5px solid var(--good);background:transparent;color:var(--good);padding:9px 15px;border-radius:999px;cursor:pointer;margin-left:auto}.csv-btn:hover{background:var(--good);color:var(--bg)}.txn-amt{display:block;font-size:10.5px;color:var(--visa);font-weight:700;margin-top:2px}.amount-input-wrap{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted-dark);font-weight:700}.amount-input-wrap input{width:70px;border:1.5px solid var(--line-dark);background:var(--bg);color:var(--white);border-radius:8px;padding:7px 9px;font:700 12.5px var(--font)}.skeleton-wrap{display:flex;flex-wrap:wrap;gap:16px}.skeleton{border-radius:20px;background:linear-gradient(90deg,var(--bg2) 25%,#232a52 37%,var(--bg2) 63%);background-size:400% 100%;animation:skeleton-shine 1.4s ease infinite}.hero-sk{height:190px;flex:1 1 260px}.block-sk{height:120px;width:100%}@keyframes skeleton-shine{0%{background-position:100% 50%}100%{background-position:0 50%}}
.map-wrap{display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start}.map-svg-host{width:380px;max-width:100%;flex-shrink:0;background:var(--paper);border-radius:16px;padding:14px}.map-country{cursor:pointer;stroke:var(--bg);stroke-width:1}.map-country:hover{stroke:white;stroke-width:1.5}.map-country.active{stroke:white;stroke-width:2}.map-scheme-dot{pointer-events:none}.map-legend{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted-dark);margin-top:10px;flex-wrap:wrap}.map-legend .ramp{width:70px;height:6px;border-radius:3px}.map-detail{flex:1;min-width:220px;background:var(--paper);color:var(--text);border-radius:16px;padding:18px 20px;min-height:170px}
</style>
</head>
<body>
<div class="page">
  <header class="masthead">
    <div><div class="eyebrow" id="eyebrow"><span class="live-dot"></span> načítání dat</div><h1>Card Fee Tracker</h1><p class="lede">Oficiální interchange sazby Visa a Mastercard napříč 30 zeměmi EU/EEA. Každá sazba je propojená s oficiálním zdrojovým ceníkem.</p></div>
    <div class="month-pill">Automatická aktualizace 1× měsíčně</div>
  </header>
  <div class="banner" id="banner"></div>
  <nav class="layer-tabs" id="layerTabs">
    <button class="tab active" data-layer="interchange">Interchange fees</button>
  </nav>
  <div class="controls" id="controls"></div>
  <main id="app"><div class="skeleton-wrap"><div class="skeleton hero-sk"></div><div class="skeleton hero-sk"></div><div class="skeleton hero-sk"></div><div class="skeleton block-sk"></div><div class="skeleton block-sk" style="height:340px"></div></div></main>
  <div class="methodology" id="methodology"></div>
  <footer><span>Card Fee Tracker · EU/EEA · data se nepublikují bez odkazu na zdroj</span><span id="footerStatus"></span></footer>
</div>
<script>
(function(){
"use strict";
const NETWORK_LABELS={visa:"Visa",mastercard:"Mastercard",unspecified:"Obecně"};
const CATEGORY_LABELS={consumer_debit:"Consumer debit",consumer_credit:"Consumer credit",commercial:"Commercial / business"};
const FEE_LABELS={interchange:"Interchange",scheme_fee:"Scheme fee",processing_fee:"Processing fee",merchant_service_charge:"Merchant service charge"};
const COLORS={visa:"#5865f2",mastercard:"#ef7b2d",scheme_fee:"#0fa7a0",processing_fee:"#8b5cf6",merchant_service_charge:"#d94e76"};
const state={data:null,layer:"interchange",category:"consumer_credit",region:"all",sort:"name",dir:"asc",estimateCountry:null,estimateNetwork:"visa",amount:50,margin:.20,mapSelected:"DE",search:"",txnAmount:50};
const esc=s=>String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
const fmtPct=v=>v==null||Number.isNaN(Number(v))?"—":Number(v).toFixed(Number(v)<1?2:1).replace(/\.00$/,"")+" %";
const mid=i=>(Number(i.value_low)+Number(i.value_high))/2;
const stats=values=>{values=values.filter(v=>Number.isFinite(v));if(!values.length)return null;return{avg:values.reduce((a,b)=>a+b,0)/values.length,min:Math.min(...values),max:Math.max(...values),n:values.length}};
const publicBlock=()=>state.data.public_fee_observations||{items:[],summary:[],search_status:{}};
const countryByIso=iso=>(state.data.countries||[]).find(c=>c.iso2===iso);
const filteredCountries=()=> (state.data.countries||[]).filter(c=>(state.region==="all"||c.region===state.region)&&(!state.search||c.name.toLowerCase().includes(state.search.toLowerCase())));
const publicSegment=()=>state.category==="commercial"?"commercial":"consumer";
function relevantItems(feeTypes){const allowed=Array.isArray(feeTypes)?feeTypes:[feeTypes];const countries=new Set(filteredCountries().map(c=>c.iso2));return(publicBlock().items||[]).filter(i=>allowed.includes(i.fee_type)&&countries.has(i.country)&&(i.card_segment==="unspecified"||i.card_segment===publicSegment()));}
function filteredObs(feeType,countryIso=null,network=null){return(publicBlock().items||[]).filter(i=>i.fee_type===feeType&&(!countryIso||i.country===countryIso)&&(i.card_segment==="unspecified"||i.card_segment===publicSegment())&&(!network||i.network==="unspecified"||i.network===network));}
function obsStats(feeType,countryIso=null,network=null){return stats(filteredObs(feeType,countryIso,network).filter(i=>i.value_kind==="percent").map(mid));}
function activeNetworks(){return["visa","mastercard"].filter(n=>(state.data.countries||[]).some(c=>c[n]&&c[n][state.category]));}
function networkSummary(network){const vals=filteredCountries().map(c=>c[network]&&c[network][state.category]&&c[network][state.category].avg).filter(v=>v!=null);return stats(vals);}
function metricCard(title,kicker,block,accent,note){if(!block)return`<article class="metric-card" style="--accent:${accent}"><div class="kicker">${esc(kicker)}</div><h2>${esc(title)}</h2><div class="empty">Pro aktuální filtr nejsou veřejně ověřitelné číselné údaje.</div></article>`;const maxScale=Math.max(block.max,block.avg,.1)*1.12;const left=block.min/maxScale*100,width=Math.max((block.max-block.min)/maxScale*100,1),dot=block.avg/maxScale*100;return`<article class="metric-card" style="--accent:${accent}"><div class="kicker">${esc(kicker)}</div><h2>${esc(title)}</h2><div class="big-number">${fmtPct(block.avg)}</div><div class="subline">${esc(note||(`${block.n} hodnot`))}</div><div class="range-track"><div class="range-fill" style="left:${left}%;width:${width}%"></div><div class="range-dot" style="left:${dot}%"></div></div><div class="range-labels"><span>${fmtPct(block.min)}</span><span>${fmtPct(block.max)}</span></div></article>`}
function estimateData(){const iso=state.estimateCountry;const c=countryByIso(iso);if(!c)return null;const net=state.estimateNetwork;const interchange=c[net]&&c[net][state.category];const scheme=obsStats("scheme_fee",iso,net);const processing=obsStats("processing_fee",iso,net);const msc=obsStats("merchant_service_charge",iso,net);const fixedAverage=ft=>{const values=filteredObs(ft,iso,net).filter(i=>i.value_kind==="fixed"&&i.basis==="per_transaction"&&i.currency==="EUR").map(mid);return values.length?values.reduce((a,b)=>a+b,0)/values.length:0};const fixedAmount=fixedAverage("scheme_fee")+fixedAverage("processing_fee");const fixedPct=state.amount>0?fixedAmount/state.amount*100:0;if(msc)return{value:msc.avg,mode:"observed",components:{msc:msc.avg},complete:true};if(!interchange)return null;const schemeV=scheme?scheme.avg:0,processingV=processing?processing.avg:0;return{value:interchange.avg+schemeV+processingV+fixedPct+Number(state.margin||0),mode:"model",complete:!!(scheme||processing),components:{interchange:interchange.avg,scheme:schemeV,processing:processingV,fixed:fixedPct,margin:Number(state.margin||0)}}}
function estimateCard(){const countries=(state.data.countries||[]).filter(c=>c.visa||c.mastercard);if(!state.estimateCountry&&countries[0])state.estimateCountry=countries[0].iso2;const e=estimateData();const countryOptions=countries.map(c=>`<option value="${c.iso2}" ${c.iso2===state.estimateCountry?"selected":""}>${esc(c.name)}</option>`).join("");const networks=activeNetworks();if(!networks.includes(state.estimateNetwork))state.estimateNetwork=networks[0]||"visa";const networkOptions=networks.map(n=>`<option value="${n}" ${n===state.estimateNetwork?"selected":""}>${NETWORK_LABELS[n]}</option>`).join("");let formula="Vyber zemi a síť.";let badge="";if(e){if(e.mode==="observed"){formula=`Veřejně uváděný MSC: <strong>${fmtPct(e.components.msc)}</strong>. Pokud existují přímé údaje o merchant service charge, mají přednost před modelem.`;badge='<span class="status-tag observed">veřejně pozorovaný MSC</span>'}else{formula=`Interchange <strong>${fmtPct(e.components.interchange)}</strong> + scheme <strong>${fmtPct(e.components.scheme)}</strong> + processing <strong>${fmtPct(e.components.processing)}</strong> + fixní poplatky po přepočtu <strong>${fmtPct(e.components.fixed)}</strong> + zadaná marže acquirera <strong>${fmtPct(e.components.margin)}</strong>.`;badge=e.complete?'<span class="status-tag model">model podle veřejných dat</span>':'<span class="status-tag incomplete">neúplný model – část veřejných dat chybí</span>'} }
return`<article class="metric-card estimate-card"><div><div class="kicker">Scénář pro jednu transakci</div><h2>Odhadovaný reálný poplatek</h2><div class="big-number">${e?fmtPct(e.value):"—"}</div><div class="subline">Přednostně veřejně uváděný MSC; jinak transparentní součet dostupných složek.</div>${badge}</div><div class="estimate-controls"><label>Země<select id="estimateCountry">${countryOptions}</select></label><label>Schéma<select id="estimateNetwork">${networkOptions}</select></label><label>Hodnota transakce v EUR<input id="amount" type="number" min="1" step="1" value="${state.amount}"></label><label>Předpoklad marže acquirera v p. b.<input id="margin" type="number" min="0" step="0.01" value="${state.margin}"></label></div><div class="formula">${formula}</div></article>`}
function renderHero(){let cards=[];if(state.layer==="interchange")cards=activeNetworks().map(n=>metricCard(NETWORK_LABELS[n],CATEGORY_LABELS[state.category],networkSummary(n),COLORS[n],"nevážený průměr publikovaných sazeb v zemích filtru"));else if(state.layer==="scheme_processing")cards=[metricCard("Scheme fees","veřejně dohledané údaje",stats(relevantItems("scheme_fee").filter(i=>i.value_kind==="percent").map(mid)),COLORS.scheme_fee,"jednoduchý průměr veřejně uvedených procent"),metricCard("Processing fees","veřejně dohledané údaje",stats(relevantItems("processing_fee").filter(i=>i.value_kind==="percent").map(mid)),COLORS.processing_fee,"odděleně od interchange")];else cards=[metricCard("Merchant service charge","tržní a mediální údaje",stats(relevantItems("merchant_service_charge").filter(i=>i.value_kind==="percent").map(mid)),COLORS.merchant_service_charge,"veřejně uváděná cena pro obchodníka")];return`<section class="hero">${cards.join("")}</section>`}
function renderControls(){const categories=Object.keys(CATEGORY_LABELS).map(c=>`<button class="seg-btn ${state.category===c?"active":""}" data-cat="${c}">${CATEGORY_LABELS[c]}</button>`).join("");const regionBtns=["all",...(state.data.regions||[])].map(r=>`<button class="chip-btn region-btn ${state.region===r?"active":""}" data-region="${r}">${r==="all"?"Všechny regiony":r}</button>`).join("");document.getElementById("controls").innerHTML=`<div class="seg-group">${categories}</div><div class="right-controls">${regionBtns}</div><p style="width:100%; font-size:11px; color:var(--muted-dark); margin:6px 0 0">Zobrazená sazba je základní ("Base") sazba dané kategorie. Konkrétní kanál platby (QR kód, kontaktní, e-commerce) může mít v ceníku vlastní, jinou sazbu -- tu tady necíleně nerozlišujeme, abychom neukazovali čísla, která jsme si neověřili.</p>`}
function sourceLink(url,label="zdroj"){return url?`<a class="source-link" href="${esc(url)}" target="_blank" rel="noopener">${esc(label)}</a>`:"—"}
function itemsForCountry(country,feeTypes){const arr=Array.isArray(feeTypes)?feeTypes:[feeTypes];return relevantItems(arr).filter(i=>i.country===country)}
function mediaCell(items,kind){if(!items.length)return'<span class="range">—</span>';return`<div class="media-badges">${items.slice(0,5).map(i=>`<a class="media-badge ${kind}" href="${esc(i.source_url)}" target="_blank" rel="noopener" title="${esc(i.headline)}">${esc(i.display_value)}</a>`).join("")}${items.length>5?`<span class="confidence">+${items.length-5}</span>`:""}</div>`}
function interchangeTable(){const nets=activeNetworks();const amt=Number(state.txnAmount);const showAmt=amt>0;const rows=filteredCountries().slice().sort((a,b)=>a.name.localeCompare(b.name)).map(c=>{let cells=nets.map(n=>{const b=c[n]&&c[n][state.category];const warn=c[n]&&c[n].warnings&&c[n].warnings.length?`<span class="warn-flag" title="${esc(c[n].warnings.join(" · "))}">△</span>`:"";const amtLine=b&&showAmt?`<span class="txn-amt">≈ ${(b.avg/100*amt).toFixed(3)} € při ${amt} €</span>`:"";return`<td>${b?`<span class="value">${fmtPct(b.avg)}</span><span class="range">${fmtPct(b.min)}–${fmtPct(b.max)}</span>${amtLine}`:"—"}${warn}</td><td>${c[n]?sourceLink(c[n].source_url,"oficiální ceník"):"—"}</td>`}).join("");return`<tr><td><span class="country">${esc(c.name)}</span><span class="region">${esc(c.region)}</span></td>${cells}</tr>`}).join("");const heads=nets.map(n=>`<th>${NETWORK_LABELS[n]} sazba</th><th>Zdroj</th>`).join("");return`<div class="table-wrap"><table><thead><tr><th>Země</th>${heads}</tr></thead><tbody>${rows}</tbody></table></div>`}
function publicTable(layer){const feeTypes=layer==="scheme_processing"?["scheme_fee","processing_fee"]:["merchant_service_charge"];const all=relevantItems(feeTypes);const hasVisa=all.some(i=>i.network==="visa"),hasMc=all.some(i=>i.network==="mastercard"),hasGeneral=all.some(i=>i.network==="unspecified");const networks=[];if(hasVisa)networks.push("visa");if(hasMc)networks.push("mastercard");if(hasGeneral||!networks.length)networks.push("unspecified");const rows=filteredCountries().map(c=>{let cells="";if(layer==="scheme_processing"){["scheme_fee","processing_fee"].forEach(ft=>{networks.forEach(n=>{const b=obsStats(ft,c.iso2,n==="unspecified"?null:n);cells+=`<td>${b?`<span class="value">${fmtPct(b.avg)}</span><span class="range">${fmtPct(b.min)}–${fmtPct(b.max)} · n=${b.n}</span>`:"—"}</td>`})})}else{networks.forEach(n=>{const b=obsStats("merchant_service_charge",c.iso2,n==="unspecified"?null:n);cells+=`<td>${b?`<span class="value">${fmtPct(b.avg)}</span><span class="range">${fmtPct(b.min)}–${fmtPct(b.max)} · n=${b.n}</span>`:"—"}</td>`})}const media=itemsForCountry(c.iso2,feeTypes);return`<tr><td><span class="country">${esc(c.name)}</span><span class="region">${esc(c.region)}</span></td>${cells}${all.length?`<td>${mediaCell(media,layer==="msc"?"msc":"scheme")}</td>`:""}</tr>`}).join("");let heads="";if(layer==="scheme_processing"){["Scheme fee","Processing fee"].forEach(label=>networks.forEach(n=>heads+=`<th>${label} · ${NETWORK_LABELS[n]}</th>`))}else networks.forEach(n=>heads+=`<th>MSC · ${NETWORK_LABELS[n]}</th>`);return`<div class="table-wrap"><table><thead><tr><th>Země</th>${heads}${all.length?"<th>Media / veřejný zdroj</th>":""}</tr></thead><tbody>${rows}</tbody></table></div>`}
function metricFromSnapshot(snap,series){if(series!=="visa"&&series!=="mastercard")return null;const allCountries=snap.countries||[];if(allCountries.length===0){const s=snap.summary&&snap.summary[series]&&snap.summary[series][state.category];return s?s.avg:null}const countries=allCountries.filter(c=>state.region==="all"||c.region===state.region);const vals=countries.map(c=>c[series]&&c[series][state.category]&&c[series][state.category].avg).filter(v=>v!=null);return vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:null}
function trendSeries(){if(state.layer==="interchange")return activeNetworks();if(state.layer==="scheme_processing")return["scheme_fee","processing_fee"];return["merchant_service_charge"]}
function seriesLabel(s){return NETWORK_LABELS[s]||FEE_LABELS[s]}
function seriesColor(s){return COLORS[s]||"#5865f2"}
function trendSvg(points,series){const valid=points.flatMap(p=>series.map(s=>p.values[s])).filter(v=>v!=null);if(points.length<2||!valid.length)return'<div class="empty">Trend se začne automaticky vykreslovat po dalších měsíčních snímcích.</div>';const w=920,h=235,L=48,R=15,T=15,B=34,max=Math.max(...valid,.1)*1.18,plotW=w-L-R,plotH=h-T-B,x=i=>L+(points.length===1?plotW/2:i*plotW/(points.length-1)),y=v=>T+plotH-(v/max)*plotH;let grid="";for(let i=0;i<=4;i++){const v=max*i/4,yy=y(v);grid+=`<line x1="${L}" x2="${w-R}" y1="${yy}" y2="${yy}" stroke="#ddd8cf"/><text x="${L-8}" y="${yy+4}" text-anchor="end" font-size="10" fill="#6c7087">${v.toFixed(2)}%</text>`}let lines=series.map(s=>{const coords=points.map((p,i)=>p.values[s]!=null?`${x(i)},${y(p.values[s])}`:null).filter(Boolean);if(!coords.length)return"";return`${coords.length>1?`<polyline fill="none" stroke="${seriesColor(s)}" stroke-width="3" points="${coords.join(" ")}"/>`:""}${points.map((p,i)=>p.values[s]!=null?`<circle cx="${x(i)}" cy="${y(p.values[s])}" r="4" fill="${seriesColor(s)}"><title>${p.date}: ${p.values[s].toFixed(3)}%</title></circle>`:"").join("")}`}).join("");const labels=points.map((p,i)=>`<text x="${x(i)}" y="${h-9}" text-anchor="middle" font-size="10" fill="#15182d">${p.date.slice(0,7)}</text>`).join("");return`<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto;display:block">${grid}${lines}${labels}</svg>`}
async function renderTrend(){const section=document.getElementById("trendSection");const host=document.getElementById("trendHost");try{const index=await fetch("data/history/index.json",{cache:"no-store"}).then(r=>r.ok?r.json():[]);const RECENT_CUTOFF="2020-01-01";const recentEntries=index.filter(e=>e.date>=RECENT_CUTOFF);if(recentEntries.length<2){section.style.display="none";return}section.style.display="";const entries=index.slice(-18);const snaps=await Promise.all(entries.map(e=>fetch("data/history/"+e.file,{cache:"no-store"}).then(r=>r.ok?r.json():null).catch(()=>null)));const series=trendSeries();const points=entries.map((e,i)=>{const values={};series.forEach(s=>values[s]=snaps[i]?metricFromSnapshot(snaps[i],s):null);return{date:e.date,values}});host.innerHTML=trendSvg(points,series)}catch(e){if(section)section.style.display="none"}}

function lerpColor(t,a,b){const ai=parseInt(a.slice(1),16),bi=parseInt(b.slice(1),16);const ar=(ai>>16)&255,ag=(ai>>8)&255,ab=ai&255;const br=(bi>>16)&255,bg=(bi>>8)&255,bb=bi&255;const r=Math.round(ar+(br-ar)*t),g=Math.round(ag+(bg-ag)*t),bl=Math.round(ab+(bb-ab)*t);return `rgb(${r},${g},${bl})`}

function countryMap(){const values={};let lo=Infinity,hi=-Infinity;state.data.countries.forEach(c=>{const v=mapValue(c);if(v!=null){values[c.iso2]=v;if(v<lo)lo=v;if(v>hi)hi=v}});const span=hi>lo?hi-lo:1;const shapes=Object.entries(COUNTRY_PATHS).map(([iso,p])=>{const country=state.data.countries.find(x=>x.iso2===iso);const v=values[iso];const fill=v!=null?feeColor((v-lo)/span):"#3a3f5c";const isActive=state.mapSelected===iso;const inRegion=state.region==="all"||(country&&country.region===state.region);const opacity=inRegion?1:0.22;const scheme=DOMESTIC_SCHEME[iso]?`<text class="map-scheme-dot" x="${p.cx}" y="${p.cy}" font-size="13" text-anchor="middle" dominant-baseline="central" opacity="${opacity}">💳</text>`:"";return `<path class="map-country${isActive?" active":""}" data-iso="${iso}" d="${p.d}" fill="${fill}" opacity="${opacity}"><title>${country?country.name:iso}</title></path>${scheme}`}).join("");const selected=state.data.countries.find(x=>x.iso2===state.mapSelected);return `<div class="map-wrap"><div><div class="map-svg-host"><svg viewBox="0 0 600 800" style="width:100%; height:auto; display:block">${shapes}</svg></div><div class="map-legend"><span>${fmtPct(lo)}</span><span class="ramp" style="background:linear-gradient(90deg,#89bd73,#ffeb8a,#f59855)"></span><span>${fmtPct(hi)}</span><span style="margin-left:10px">💳 = má domácí schéma</span></div></div><div class="map-detail" id="mapDetail">${mapDetailHTML(selected)}</div></div>`}
