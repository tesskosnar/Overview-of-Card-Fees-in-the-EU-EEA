<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Fee Tracker</title>
    <style>
        :root {
            --bg: #0f1115;
            --paper: #181a20;
            --paper2: #22252e;
            --text: #e0e2e8;
            --text-dim: #8c92a3;
            --accent: #5865f2;
            --accent-hover: #4752c4;
            --border: #2d313e;
            --radius: 8px;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.5;
        }

        header {
            padding: 1rem 2rem;
            background: var(--paper);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #eyebrow {
            font-size: 0.85rem;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background-color: #23a559;
            border-radius: 50%;
            display: inline-block;
        }

        main {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .section-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
            margin-bottom: 1rem;
        }

        h2 { margin: 0; font-size: 1.25rem; font-weight: 600; }
        .section-note { color: var(--text-dim); font-size: 0.85rem; }

        /* Map Styles */
        .map-wrap {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
            background: var(--paper);
            padding: 1.5rem;
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }

        .map-svg-host {
            width: 100%;
            height: auto;
            max-height: 500px;
        }

        .map-country {
            stroke: var(--bg);
            stroke-width: 1;
            cursor: pointer;
            transition: fill 0.2s, stroke-width 0.2s;
        }

        .map-country:hover {
            stroke: var(--text);
            stroke-width: 2;
        }

        .map-country.active {
            stroke: var(--accent);
            stroke-width: 3;
        }

        /* Detail Panel */
        .map-detail {
            background: var(--paper2);
            padding: 1.5rem;
            border-radius: var(--radius);
        }

        .kicker {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-dim);
            margin-bottom: 0.5rem;
        }

        .map-detail h3 { margin-top: 0; font-size: 1.5rem; }

        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--paper);
            border-radius: var(--radius);
            overflow: hidden;
        }

        th, td {
            padding: 0.75rem 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            background: var(--paper2);
            color: var(--text-dim);
            font-weight: 500;
            font-size: 0.85rem;
        }

        tr:last-child td { border-bottom: none; }

        .csv-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .csv-btn:hover { background: var(--accent-hover); }

        .metric {
            font-size: 2rem;
            font-weight: bold;
            color: var(--accent);
        }
    </style>
</head>
<body>

<header>
    <div>
        <h1 style="margin: 0; font-size: 1.2rem;">Card Fee Tracker</h1>
    </div>
    <div id="eyebrow"><span class="live-dot"></span> Načítání dat...</div>
</header>

<main id="app">
    <!-- Obsah se generuje dynamicky -->
</main>

<script>
(function() {
// --- STATE MANAGEMENT ---
const state = {
    data: null,
    mapSelected: 'CZ',
    layer: 'interchange',
    estimateNetwork: 'Visa',
    category: 'Consumer'
};

// --- DATA & SVG PATHS ---
// Zde je zkrácený objekt s mapovými podklady (přidej si sem zbytek svých SVG dat)
const COUNTRY_PATHS = {
    "CZ": { "d": "M419.6,359.1 L425.2,362.4 L432.1,365.1 L437.5,361.8 L442.1,363.5 L448.3,361.2 L454.1,364.5 L460.5,361.2 L468.2,363.5 L475.1,368.2 L478.4,374.5 L475.1,380.2 L469.8,382.5 L465.1,388.1 L458.2,389.5 L452.1,385.2 L445.5,387.1 L439.2,384.5 L432.5,386.2 L426.1,381.5 L419.8,383.2 L415.1,378.5 L411.5,372.1 L414.2,365.5 Z", "cx": 445, "cy": 375 },
    "SK": { "d": "M475.1,368.2 L482.5,365.5 L489.1,368.2 L495.5,365.1 L502.1,368.5 L508.4,364.2 L515.1,367.5 L518.5,373.1 L512.2,378.5 L505.1,382.2 L498.4,379.5 L491.5,384.1 L485.2,381.5 L478.4,374.5 Z", "cx": 495, "cy": 374 }
};

// --- MOCK DATA (Když není připojený backend/JSON) ---
const mockData = {
    generated_at: "2026-07-21 14:14",
    countries: [
        { iso: "CZ", name: "Česká republika", Visa: { Consumer: { avg: 0.20 }, Commercial: { avg: 1.30 } }, Mastercard: { Consumer: { avg: 0.20 }, Commercial: { avg: 1.25 } } },
        { iso: "SK", name: "Slovensko", Visa: { Consumer: { avg: 0.20 }, Commercial: { avg: 1.20 } }, Mastercard: { Consumer: { avg: 0.20 }, Commercial: { avg: 1.15 } } }
    ],
    public_fee_observations: {
        items: [
            { country: "CZ", date: "2026-06", note: "Zvýšení poplatků za přeshraniční platby u komerčních karet." }
        ]
    }
};

// --- HELPERS ---
function countryByIso(iso) {
    if (!state.data || !state.data.countries) return null;
    return state.data.countries.find(c => c.iso === iso);
}

function getCountryColor(iso) {
    if (!state.data) return "var(--paper2)";
    const c = countryByIso(iso);
    if (!c) return "var(--paper2)";
    
    if (state.layer === "interchange") {
        const val = c[state.estimateNetwork] && c[state.estimateNetwork][state.category];
        if (!val) return "var(--paper2)";
        const intensity = Math.min(val.avg / 2, 1);
        return `rgba(88, 101, 242, ${0.2 + intensity * 0.8})`;
    }
    return "var(--paper2)";
}

// --- RENDER FUNCTIONS ---
function estimateCard() {
    const c = countryByIso(state.mapSelected);
    if (!c) return "<p>Data nejsou k dispozici.</p>";

    const feeData = c[state.estimateNetwork]?.[state.category];
    if (!feeData) return "<p>Pro tuto konfiguraci chybí data.</p>";

    return `
        <div>
            <p style="color: var(--text-dim); margin-bottom: 0;">Průměrná sazba (${state.estimateNetwork} ${state.category})</p>
            <div class="metric">${feeData.avg.toFixed(2)} %</div>
        </div>
    `;
}

function renderMap() {
    const paths = Object.keys(COUNTRY_PATHS).map(iso => {
        const pathData = COUNTRY_PATHS[iso];
        const isActive = state.mapSelected === iso ? "active" : "";
        const fill = getCountryColor(iso);
        return `<path class="map-country ${isActive}" d="${pathData.d}" fill="${fill}" onclick="window.updateMapSelection('${iso}')"><title>${iso}</title></path>`;
    }).join("");

    return `<div class="map-wrap">
        <svg class="map-svg-host" viewBox="350 300 250 150">
            ${paths}
        </svg>
        <div class="map-detail">
            <div class="kicker">Detail země</div>
            <h3>${state.mapSelected || "Vyberte zemi na mapě"}</h3>
            ${estimateCard()}
        </div>
    </div>`;
}

function interchangeTable() {
    if (!state.data || !state.data.countries) return "";
    let rows = state.data.countries.map(c => {
        return `<tr>
            <td>${c.iso} - ${c.name}</td>
            <td>${c.Visa?.Consumer?.avg?.toFixed(2) || '-'} %</td>
            <td>${c.Mastercard?.Consumer?.avg?.toFixed(2) || '-'} %</td>
        </tr>`;
    }).join("");

    return `<table>
        <thead>
            <tr><th>Země</th><th>Visa Consumer</th><th>Mastercard Consumer</th></tr>
        </thead>
        <tbody>${rows}</tbody>
    </table>`;
}

function renderControls() {
    // V této zjednodušené verzi jsou controly statické nebo vynechané pro přehlednost,
    // případně sem můžeš vrátit své selectboxy.
    return ``;
}

function render() {
    if (!state.data) return;
    
    document.getElementById("eyebrow").innerHTML = '<span class="live-dot"></span> ' + (state.data.generated_at || "Aktuální data");
    
    let html = ``;
    
    html += `<div class="section-head"><h2>Mapa a odhad poplatků</h2><span class="section-note">Kliknutím na mapu upravíte scénář</span></div>`;
    html += renderMap();

    html += `<div class="section-head"><h2>Interchange sazby</h2><button class="csv-btn" onclick="alert('Export se připravuje...')">Stáhnout CSV</button></div>`;
    html += interchangeTable();
    
    document.getElementById("app").innerHTML = html;
}

// Global scope pro onclick eventy z generovaného HTML
window.updateMapSelection = function(iso) {
    state.mapSelected = iso;
    render();
};

function loadData() {
    // Simulace načtení dat
    state.data = mockData;
    render();
}

// Init
loadData();

})();
</script>
</body>
</html>
