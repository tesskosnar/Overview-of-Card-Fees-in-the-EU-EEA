name: Monthly card fee scrape

on:
  schedule:
    - cron: "0 5 1 * *"   # 05:00 UTC on the 1st of every month
  workflow_dispatch: {}    # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the scraper
        run: python3 scraper/main.py

      - name: Commit and push updated data
        run: |
          git config user.name "card-fee-tracker-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/data
          if git diff --cached --quiet; then
            echo "No data changes, nothing to commit."
          else
            git commit -m "Monthly data update ($(date -u +%Y-%m-%d))"
            git push
          fi
